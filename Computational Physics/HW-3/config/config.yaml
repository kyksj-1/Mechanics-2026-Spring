# Kapitza Pendulum Simulation Configuration

kapitza:
  # 物理参数
  parameters:
    l: 1.0     # 摆长
    m: 1.0     # 质量
    g: 1.0     # 重力加速度
    a: 0.1     # 驱动振幅
  
  # 实验的控制参数 omega 列表
  omegas:
    - 5.0
    - 10.0
    - 20.0
  
  # 初始条件 [theta_0, omega_0] (theta = 4/5 * pi)
  initial_conditions:
    theta_0: 2.5132741228718345 # 4 * pi / 5
    omega_0: 0.0

  # 时间设置
  time:
    t_start: 0.0
    t_end: 50.0
    dt: 0.01  # RK4步长

# Ping-Pong Simulation Configuration
pingpong:
  parameters:
    g: 10.0      # 重力加速度
    gamma: 0.02  # 空气阻尼
    A: 0.02      # 球拍振幅
    omega: 12.566370614359172 # 2 * 2 * pi = 4 * pi
    
  initial_conditions:
    y_0: 0.3
    v_0: 0.0
    y_0_list: [0.3, 0.4, 0.45, 0.5, 0.6] # 不同的初始释放高度，用于探测稳态模式
    
  time:
    t_start: 0.0
    t_end: 1000.0
    dt: 0.002
    

