# Kapitza Pendulum Simulation Configuration

kapitza:
  # 物理参数
  parameters:
    l: 1.0     # 摆长
    m: 1.0     # 质量
    g: 1.0     # 重力加速度
    a: 0.1     # 驱动振幅
  
  # 实验的控制参数 omega 列表
  omegas:
    - 5.0
    - 10.0
    - 20.0
  
  # 初始条件 [theta_0, omega_0] (theta = 4/5 * pi)
  initial_conditions:
    theta_0: 2.5132741228718345 # 4 * pi / 5
    omega_0: 0.0

  # 时间设置
  time:
    t_start: 0.0
    t_end: 50.0
    dt: 0.01  # RK4步长

